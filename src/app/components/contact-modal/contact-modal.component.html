<div class="modal-content-wrapper ion-padding">
    <ion-button fill="clear" class="close-btn" (click)="dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
    </ion-button>

    <div class="modal-header">
        <h2 class="premium-gradient">Get In Touch</h2>
        <p>We'll get back to you with a strategic plan for your business.</p>
    </div>

    <div class="modal-form">
        <div class="form-group">
            <input type="text" [(ngModel)]="contactData.name" placeholder="Your Name" class="gt-input">
        </div>
        <div class="form-group">
            <input type="email" [(ngModel)]="contactData.email" placeholder="Email Address" class="gt-input">
        </div>
        <div class="form-group">
            <textarea [(ngModel)]="contactData.message" placeholder="Tell us about your project" rows="4"
                class="gt-input"></textarea>
        </div>

        <ion-button (click)="submitForm()" [disabled]="isSubmitting" class="cta-button submit-btn">
            {{ isSubmitting ? 'Sending...' : 'Send Message' }}
            <ion-icon slot="end" name="paper-plane-outline"></ion-icon>
        </ion-button>
    </div>
</div>
