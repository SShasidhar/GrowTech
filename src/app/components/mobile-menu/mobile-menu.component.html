<ion-list lines="none" class="mobile-menu-list ion-no-padding">
    <ion-item button routerLink="/home" (click)="close()" class="menu-item">
        <ion-icon name="home-outline" slot="start"></ion-icon>
        <ion-label>Home</ion-label>
    </ion-item>

    <ion-item button routerLink="/about" (click)="close()" class="menu-item">
        <ion-icon name="information-circle-outline" slot="start"></ion-icon>
        <ion-label>About</ion-label>
    </ion-item>

    <ion-item button *ngIf="isAdmin" routerLink="/dashboard" (click)="close()" class="menu-item admin-item">
        <ion-icon name="apps-outline" slot="start" color="primary"></ion-icon>
        <ion-label color="primary">Dashboard</ion-label>
    </ion-item>

    <div class="menu-divider"></div>

    <ion-item button *ngIf="!user" (click)="login()" class="menu-item">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        <ion-label>Login</ion-label>
    </ion-item>

    <ion-item button *ngIf="user" (click)="logout()" class="menu-item">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        <ion-label>Logout</ion-label>
    </ion-item>

    <ion-item button (click)="toggleTheme()" class="menu-item">
        <ion-icon [name]="isDarkMode ? 'sunny-outline' : 'moon-outline'" slot="start"></ion-icon>
        <ion-label>{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</ion-label>
    </ion-item>
</ion-list>
